name = "hunter-x-game-devhub"
main = "_worker.js"
compatibility_date = "2024-01-01"

# KV Namespace — create via: wrangler kv:namespace create "HXG_KV"
[[kv_namespaces]]
binding = "HXG_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# Optional: Set secrets via wrangler
# wrangler secret put OPENAI_API_KEY

[vars]
ENVIRONMENT = "production"
